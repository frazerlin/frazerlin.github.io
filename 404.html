<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting, please wait...</p>
  <script>
    (function() {
      const path = window.location.pathname.toLowerCase();

      const routes = {
        "baidu": "https://www.baidu.com/",
        "zhihu": "https://www.zhihu.com/",
        "github": "https://github.com/",
        "bilibili": "https://www.bilibili.com/",
        "fclick": "https://github.com/frazerlin/fcanet",
        "focuscut": "https://github.com/frazerlin/focuscut",
      };

      for (const key in routes) {
        if (path.includes(key)) {
          console.log(`Matched keyword:${key}，redirecting to ${routes[key]}`);
          window.location.href = routes[key];
          return;
        }
      }

      console.log("No keyword matched, redirecting to homepage");
      window.location.href = "https://www.lin-zheng.com/";
    })();
  </script>
</body>
</html>
