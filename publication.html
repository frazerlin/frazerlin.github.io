	<script>
        let mainAuthor = [];
        let allAuthor = [];

		(async () => {
        const text = await (await fetch('./material/paper_list.txt')).text();
        const [firstAuthor = [], corrAuthor = [], coopAuthor = []] = text
            .split(/\n\s*\n/)                       
            .map(g => g.split('\n')                 
                .map(l => l.trim())                   
                .filter(l => l && !l.startsWith('#'))
                .map(l => l.startsWith('@') ? l.slice(1) : l)); 

        mainAuthor = [...firstAuthor, ...corrAuthor].sort((a, b) => parseInt(b) - parseInt(a));
        allAuthor = [...mainAuthor, ...coopAuthor].sort((a, b) => parseInt(b) - parseInt(a));

        render('all');
        })();

        async function render(type) {
            const container = document.getElementById("paper-container");
            container.innerHTML = "";

            let paperList = type === 'main' ? mainAuthor : allAuthor;

            document.getElementById("btn-all").className =
                type === "all" ? "btn btn-dark w-50" : "btn btn-outline-dark w-50";

            document.getElementById("btn-main").className =
                type === "main" ? "btn btn-dark w-50" : "btn btn-outline-dark w-50";
            
            paperList = [...paperList, "23_THESIS_Doctor"];

            for (const id of paperList) {
                try {
                    const html = await fetch(`./paper/${id}/${id}.html`).then(res => res.text());
                    container.insertAdjacentHTML("beforeend", html);
                } catch (e) {
                    console.error(`Failed to load ${id}:`, e);
                }
            }
        }
	</script>
